# Dont add options with default values in this config
hide_defaults = false
# Dont add documentation to keys in this config
hide_docs = false
# Config version
version = 1

[dk2]
# Enables 32Bit Display (32bit colours instead of 16bit)
32BitDisplay = false
# Enables 32Bit Textures, ZBuffer and Display
32BitEverything = false
# Enables 32Bit Textures
32BitTextures = false
# Enables 32Bit ZBuffer (32bit ZBuffer instead of 16bit ZBuffer)
32BitZBuffer = false
CdPath = ""
CheapLightning = false
Cheat = false
# Sets Dungeon Keeper 2 to run using your default video card
ChooseCard = false
DDD = -1
# Corrects screen tinting and colour corruption caused by the mouse cursor
DisableGamma = false
# Defines Engine Heap Size in Mb
EHeap = -1
# Allows to use the extracted WAD files instead of the compressed ones
EnableArtPatching = false
EnableBumpLuminance = false
# Enables BumpMapping (try it and check the lava)
EnableBumpMapping = false
# Allows to use the extracted WAD files instead of the compressed ones
EnableFilePatching = false
Engine = false
# Defines 2D FrontEnd (I tried and the screen stayed black so, beware!) (?)
FE = false
# Defines 3D FrontEnd (?)
FE3d = false
Fps = false
HighResTextures = false
Language = ""
# Plays a level (arg is the level name)
Level = ""
# logging of out of sync
LogOOS = false
LowResTextures = false
NoChecksum = false
NoErrors = false
# Disables File CheckSum
NoFileChecksum = false
NoFps = false
# Disables frame-rate independant mouse pointer
NoIntMouse = false
NoMovies = false
NoMusic = false
NoShadows = false
NoSound = false
NoSpeech = false
PD = false
# Load a packet where arg is the name of the file (must be use with -LEVEL command)
# Must be used with dk2:pload-freq option
PLoad = ""
PLoadDemoKey = false
# Set renderer frequency
# Must be used with dk2:pload option
PLoadFreq = -1
# Defines "PMesh Reduction Level"
PMesh = -1
PNoCamera = false
PNumber = -1
PQuit = -1
# Must be used with dk2:pload-freq option
PSave = ""
PreloadResources = false
# Combined with the -LEVEL command, plays in Campaign mode
Q = false
# Defines "Shadow Level"
Shadows = -1
# disables hardware acceleration
Software = false
# Enables Software Filter (Bilinear Filtering)
SoftwareFilter = false
Sound = false
Spec = -1
TextureReductionLevel = -1

[flame]
# Alternative resources list of directory names
# in flame/resources/ path separated by ';' char
# example: dir2;dir2;dir3
alt-resources = "Quuz_AudioFix;LevelFixes;Quuz_UniqueBatTex"
# Start game with selected network gui
# format: <service>[:<srv|cli>[:<map>]]
# "mp" - goto Multiplayer
# "tcpip" - goto 'WinSock TCP/IP Internet Connection'
# "ipx" - goto 'IPX Connection For DirectPlay'
auto-network = ""
# Autosave map in minutes
# 0 - disable autosave
autosave = 5
# Show console window to see logs
console = false
# Force set Game resolution. overrides registry:configuration:video:Screen_[Width,Height] controlled by dk2
# dk2 supported values:
# - 400x300
# - 512x384
# - 640x480
# - 800x600
# - 1024x768
# - 1280x1024
# - 1600x1200
game-res = ""
# Some debug info. Used in development
inspect = false
# Number of last autosaves to keep
keep-last-autosaves = 3
# For displays with high frequency you can limit game loop time
# I don't know what fps value the dk2 developers were adjusting to
# I was comfortable with 60 (frames/ticks) per second
# use value 0 to disable limit
limit-tps = 60
# Keep the first native window size across screen mode changes
# Used only in windowed mode
lock-window-size = false
# Force set Menu resolution
# dk2 supported values:
# - 640x480
menu-res = ""
# force set local ip address in network sessions
myip = ""
# Disable initial automatic window resizing
# Used only in windowed mode
no-initial-size = false
# Flame will try to be compatible with DKII-DX.EXE v1.7.0
# All patches that breaks network compatibility will be disabled
# [drop_thing_from_hand_fix, override_max_room_count, backstab_fix, workshop_manufacture_build_time_fix, wooden_bridge_burn_fix, sleeping_possession_fix] will be disabled
original-compatible = false
# Limit game threading to one core
# This is what gog patches doing by default but in some cases they might be disabled
# Added this option as duplicate of gog:misc:SingleCore, but it will work in all cases
single-core = true
# Do not show flame launcher. Works only from command line
# DKII-DX.EXE -skip-launcher
skip-launcher = false
# Open game in windowed mode
windowed = false

[flame.experimental]
# Extending rooms limit. DK2 1.7 value is 96. max value: 255
rooms-limit = 255
test = 0

[flame.logging]
# Data packets logging
data = false
# Flame debug logging
debug = true
# Guaranteed data packets logging
gdata = false
# Try to parse DK2 packet content and dump
protocol = false
# ReadSPMessage function logging
readsp = false
# Network packets logging
sock = false
weanetr = false
